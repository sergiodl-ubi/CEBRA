## Conda environment updated for 2025 Apple silicon compatibility

name: cebra_apple
channels:
    - pytorch-lts
    - conda-forge
dependencies:
    - python==3.12
    - pip
    - pytorch
    - basedpyright
    - imbalanced-learn
    - jupyter
    - matplotlib
    - scipy
    - scikit-learn
    - pandas
    - tensorflow
    - joblib
    - umap-learn
    - opentsne
    - tqdm
    - h5py
    - pylint
    - yapf
    - isort
    - nbconvert
    - ipykernel
    - seaborn
    - pip:
        - cebra
        - tensorflow-metal
        - literate-dataclasses
        - nlb_tools@ git+https://github.com/neurallatents/nlb_tools
        - torch

